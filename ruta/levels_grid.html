                                    </div>
                                    <div class="p-4 rounded-2xl bg-slate-900 group-hover:bg-${levelColor}-500/20 border border-white/5 group-hover:border-${levelColor}-500/30 transition-all duration-500">
                                        ${getIconSVG(level.icon, `w-7 h-7 text-${levelColor}-400 transition-transform duration-500 group-hover:rotate-12`)}
                                    </div>
                                </div>
                                
                                <div class="mb-6">
                                    <h3 class="text-2xl font-black text-white group-hover:text-${levelColor}-300 transition-colors tracking-tighter leading-tight mb-2">${level.title}</h3>
                                    <p class="text-[9px] text-slate-100 font-bold uppercase tracking-[0.3em] font-mono group-hover:text-${levelColor}-400 transition-colors">${level.subtitle}</p>
                                </div>
                                
                                <p class="text-sm text-slate-200 leading-relaxed mb-10 flex-grow font-light group-hover:text-slate-200 transition-colors line-clamp-3">
                                    ${level.desc}
                                </p>
                                
                                <div class="pt-6 border-t border-white/5 flex items-center justify-between opacity-30 group-hover:opacity-100 transition-all duration-500 transform translate-y-2 group-hover:translate-y-0">
                                    <span class="text-[10px] font-black text-white uppercase tracking-widest">Ver Impacto</span>
                                    <div class="p-2 rounded-full bg-white/5">
                                        ${getIconSVG('maximize-2', `w-4 h-4 text-${levelColor}-400`)}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            timeline.appendChild(section);
        });
    </script>
</body>
</html>
